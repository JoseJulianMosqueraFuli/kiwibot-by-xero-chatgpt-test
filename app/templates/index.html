<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiwibot - Problem Reports</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body class="min-h-screen bg-base-200">
    <div class="navbar gradient-bg text-white shadow-lg">
        <div class="navbar-start">
            <div class="dropdown">
                <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </div>
                <ul tabindex="0" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-[1] mt-3 w-52 p-2 shadow text-base-content">
                    <li><a href="#report">New Report</a></li>
                    <li><a href="#lookup">Lookup Ticket</a></li>
                    <li><a href="#status">Change Status</a></li>
                </ul>
            </div>
            <a class="btn btn-ghost text-xl gap-2">
                <i data-lucide="bot" class="w-6 h-6"></i>
                Kiwibot Reports
            </a>
        </div>
        <div class="navbar-center hidden lg:flex">
            <ul class="menu menu-horizontal px-1 gap-2">
                <li><a href="#report" class="btn btn-ghost btn-sm">New Report</a></li>
                <li><a href="#lookup" class="btn btn-ghost btn-sm">Lookup Ticket</a></li>
                <li><a href="#status" class="btn btn-ghost btn-sm">Change Status</a></li>
            </ul>
        </div>
        <div class="navbar-end">
            <span class="badge badge-outline badge-info">API v1.0</span>
        </div>
    </div>

    <main class="container mx-auto px-4 py-8 max-w-6xl">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div id="report" class="card bg-base-100 shadow-xl">
                <div class="card-body">
                    <h2 class="card-title text-2xl gap-2 text-primary">
                        <i data-lucide="alert-circle" class="w-6 h-6"></i>
                        New Problem Report
                    </h2>
                    <p class="text-base-content/60">Submit a new issue report for a Kiwibot device</p>

                    <form id="problem-report-form" class="space-y-4 mt-4">
                        <div class="form-control">
                            <label class="label"><span class="label-text font-semibold">Bot ID</span></label>
                            <input type="text" id="bot-id" name="bot_id" placeholder="e.g., bot_12345" class="input input-bordered input-primary w-full" required />
                        </div>

                        <div class="form-control">
                            <label class="label"><span class="label-text font-semibold">Timestamp</span></label>
                            <input type="datetime-local" id="timestamp" name="timestamp" class="input input-bordered input-primary w-full" required />
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="form-control">
                                <label class="label"><span class="label-text font-semibold">Latitude</span></label>
                                <input type="number" step="0.001" id="location-lat" name="location_lat" placeholder="-90 to 90" min="-90" max="90" class="input input-bordered w-full" required />
                            </div>
                            <div class="form-control">
                                <label class="label"><span class="label-text font-semibold">Longitude</span></label>
                                <input type="number" step="0.001" id="location-lon" name="location_lon" placeholder="-180 to 180" min="-180" max="180" class="input input-bordered w-full" required />
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="form-control">
                                <label class="label"><span class="label-text font-semibold">Bot Status</span></label>
                                <select id="bot-status" name="bot-status" class="select select-bordered w-full">
                                    <option value="available">Available</option>
                                    <option value="busy">Busy</option>
                                    <option value="reserved">Reserved</option>
                                </select>
                            </div>
                            <div class="form-control">
                                <label class="label"><span class="label-text font-semibold">Battery Level (%)</span></label>
                                <input type="number" step="0.01" id="battery-level" name="battery_level" placeholder="0-100" min="0" max="100" class="input input-bordered w-full" required />
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="form-control">
                                <label class="label"><span class="label-text font-semibold">Software Version</span></label>
                                <input type="text" id="software-version" name="software_version" placeholder="e.g., v2.1.0" class="input input-bordered w-full" />
                            </div>
                            <div class="form-control">
                                <label class="label"><span class="label-text font-semibold">Hardware Version</span></label>
                                <input type="text" id="hardware-version" name="hardware_version" placeholder="e.g., v3.0" class="input input-bordered w-full" />
                            </div>
                        </div>

                        <div class="form-control">
                            <label class="label"><span class="label-text font-semibold">Issue Description</span></label>
                            <textarea id="content" name="content" placeholder="Describe the problem..." class="textarea textarea-bordered h-24" required></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary w-full gap-2">
                            <i data-lucide="send" class="w-4 h-4"></i>
                            Submit Report
                        </button>
                    </form>
                </div>
            </div>

            <div class="space-y-6">
                <div id="lookup" class="card bg-base-100 shadow-xl">
                    <div class="card-body">
                        <h2 class="card-title text-xl gap-2 text-secondary">
                            <i data-lucide="search" class="w-5 h-5"></i>
                            Lookup Ticket
                        </h2>
                        <form id="ticket-info-form" class="mt-4">
                            <div class="form-control">
                                <label class="label"><span class="label-text font-semibold">Ticket ID</span></label>
                                <div class="join w-full">
                                    <input type="text" id="ticket-id-information" name="ticket-id-information" placeholder="Enter ticket UUID..." class="input input-bordered input-secondary join-item w-full" required />
                                    <button type="submit" class="btn btn-secondary join-item">Search</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <div id="status" class="card bg-base-100 shadow-xl">
                    <div class="card-body">
                        <h2 class="card-title text-xl gap-2 text-accent">
                            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                            Change Ticket Status
                        </h2>
                        <form id="ticket-status-form" class="space-y-4 mt-4">
                            <div class="form-control">
                                <label class="label"><span class="label-text font-semibold">Ticket ID</span></label>
                                <input type="text" id="ticket-id-status" name="ticket-id-status" placeholder="Enter ticket UUID..." class="input input-bordered w-full" required />
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="form-control">
                                    <label class="label"><span class="label-text font-semibold">New Status</span></label>
                                    <select id="new-status" name="new_status" class="select select-bordered w-full">
                                        <option value="open">Open</option>
                                        <option value="in progress">In Progress</option>
                                        <option value="closed">Closed</option>
                                    </select>
                                </div>
                                <div class="form-control">
                                    <label class="label"><span class="label-text font-semibold">Reason</span></label>
                                    <input type="text" id="reason" name="reason" placeholder="Reason for change..." class="input input-bordered w-full" required />
                                </div>
                            </div>
                            <button type="submit" class="btn btn-accent w-full gap-2">
                                <i data-lucide="check-circle" class="w-4 h-4"></i>
                                Update Status
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div id="results-container" class="mt-8 space-y-4"></div>
    </main>

    <footer class="footer footer-center p-6 bg-base-300 text-base-content mt-12">
        <aside>
            <p>Built for Kiwibot Problem Reporting System</p>
        </aside>
    </footer>

    <div id="toast-container" class="toast toast-end z-50"></div>

    <script>
        lucide.createIcons();

        function showToast(message, type = "info") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            const colors = {
                success: "alert-success",
                error: "alert-error",
                info: "alert-info",
                warning: "alert-warning"
            };
            const icons = {
                success: "check-circle",
                error: "x-circle",
                info: "info",
                warning: "alert-triangle"
            };
            toast.className = `alert ${colors[type]} shadow-lg`;
            toast.innerHTML = `
                <i data-lucide="${icons[type]}" class="w-5 h-5"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => toast.remove(), 5000);
        }

        function createTicketCard(data) {
            const statusColors = {
                open: "badge-info",
                "in progress": "badge-warning",
                closed: "badge-success"
            };
            const typeColors = {
                hardware: "badge-error",
                software: "badge-info",
                field: "badge-warning",
                undefined: "badge-ghost"
            };
            const card = document.createElement("div");
            card.className = "card bg-base-100 shadow-xl border border-base-200";
            card.innerHTML = `
                <div class="card-body">
                    <div class="flex items-center justify-between">
                        <h3 class="card-title text-lg gap-2">
                            <i data-lucide="ticket" class="w-5 h-5 text-primary"></i>
                            Ticket: ${data.ticket_id}
                        </h3>
                        <div class="flex gap-2">
                            <span class="badge ${statusColors[data.status] || 'badge-ghost'}">${data.status}</span>
                            <span class="badge ${typeColors[data.problem_type] || 'badge-ghost'}">${data.problem_type}</span>
                        </div>
                    </div>
                    <div class="divider my-2"></div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <p class="text-sm text-base-content/60">Location</p>
                            <p class="font-medium">${data.problem_location}</p>
                        </div>
                        <div>
                            <p class="text-sm text-base-content/60">Bot ID</p>
                            <p class="font-medium">${data.bot_id}</p>
                        </div>
                    </div>
                    <div class="collapse collapse-arrow bg-base-200 mt-2">
                        <input type="checkbox" />
                        <div class="collapse-title font-medium">Summary</div>
                        <div class="collapse-content">
                            <p>${data.summary}</p>
                        </div>
                    </div>
                    ${data.status_changes && data.status_changes.length > 0 ? `
                        <div class="mt-4">
                            <h4 class="font-semibold mb-2 flex items-center gap-2">
                                <i data-lucide="history" class="w-4 h-4"></i>
                                Status History
                            </h4>
                            <ul class="timeline timeline-vertical timeline-compact">
                                ${data.status_changes.map((change, i) => `
                                    <li>
                                        ${i > 0 ? '<hr/>' : ''}
                                        <div class="timeline-start text-xs text-base-content/60">${new Date(change.timestamp).toLocaleString()}</div>
                                        <div class="timeline-middle">
                                            <i data-lucide="circle" class="w-3 h-3 text-primary"></i>
                                        </div>
                                        <div class="timeline-end timeline-box">
                                            <span class="font-medium">${change.status}</span>
                                            <p class="text-xs">${change.reason}</p>
                                        </div>
                                        ${i < data.status_changes.length - 1 ? '<hr/>' : ''}
                                    </li>
                                `).join("")}
                            </ul>
                        </div>
                    ` : ""}
                    ${data.assigned_agent ? `
                        <div class="mt-2">
                            <p class="text-sm text-base-content/60">Assigned Agent</p>
                            <p class="font-medium flex items-center gap-2">
                                <i data-lucide="user" class="w-4 h-4"></i>
                                ${data.assigned_agent}
                            </p>
                        </div>
                    ` : ""}
                </div>
            `;
            lucide.createIcons();
            return card;
        }

        document.getElementById("problem-report-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const payload = {
                content: formData.get("content"),
                heartbeat: {
                    bot_id: formData.get("bot_id"),
                    timestamp: formData.get("timestamp").replace("T", " "),
                    location: {
                        lat: parseFloat(formData.get("location_lat")),
                        lon: parseFloat(formData.get("location_lon")),
                    },
                    status: formData.get("bot-status"),
                    battery_level: parseFloat(formData.get("battery_level")),
                    software_version: formData.get("software_version"),
                    hardware_version: formData.get("hardware_version"),
                },
            };

            try {
                const response = await fetch("/v1/problem-reports", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                });

                if (response.ok) {
                    const data = await response.json();
                    showToast("Report submitted successfully!", "success");
                    const container = document.getElementById("results-container");
                    container.prepend(createTicketCard(data));
                    e.target.reset();
                } else {
                    const error = await response.json();
                    showToast(error.detail || "Failed to submit report", "error");
                }
            } catch (error) {
                showToast("Network error: " + error.message, "error");
            }
        });

        document.getElementById("ticket-info-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const ticketId = document.getElementById("ticket-id-information").value;

            try {
                const response = await fetch(`/v1/ticket/${ticketId}`);
                if (response.ok) {
                    const data = await response.json();
                    showToast("Ticket found!", "success");
                    const container = document.getElementById("results-container");
                    container.prepend(createTicketCard(data));
                } else {
                    showToast("Ticket not found", "error");
                }
            } catch (error) {
                showToast("Network error: " + error.message, "error");
            }
        });

        document.getElementById("ticket-status-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const ticketId = document.getElementById("ticket-id-status").value;
            const payload = {
                new_status: document.getElementById("new-status").value,
                reason: document.getElementById("reason").value,
            };

            try {
                const response = await fetch(`/v1/ticket/${ticketId}/status`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                });

                if (response.ok) {
                    const data = await response.json();
                    showToast("Status updated successfully!", "success");
                    const container = document.getElementById("results-container");
                    container.prepend(createTicketCard(data));
                    e.target.reset();
                } else {
                    const error = await response.json();
                    showToast(error.detail || "Failed to update status", "error");
                }
            } catch (error) {
                showToast("Network error: " + error.message, "error");
            }
        });
    </script>
</body>
</html>
